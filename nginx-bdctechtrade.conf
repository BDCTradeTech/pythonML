# Configuración Nginx para bdctechtrade.com
# Copiar a: sudo cp nginx-bdctechtrade.conf /etc/nginx/sites-available/bdctechtrade
# Activar:   sudo ln -sf /etc/nginx/sites-available/bdctechtrade /etc/nginx/sites-enabled/
# Probar:    sudo nginx -t
# Reiniciar: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name bdctechtrade.com www.bdctechtrade.com;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

